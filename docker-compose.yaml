services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - '${SERVER_PORT:-3000}:3000'
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-pass}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
    networks:
      - vera_network

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    networks:
      - vera_network
    environment:
      - SERVER_PORT=${SERVER_PORT:-3000}
      - SERVER_ADDRESS=${SERVER_ADDRESS:-localhost}

  elastic-search:
    image: elasticsearch:9.1.2
    environment:
      - discovery.type=single-node
      - ELASTIC_USERNAME=${ELASTIC_USERNAME:-elastic}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-pass}
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - http.cors.enabled=true
      - http.cors.allow-origin=http://localhost:3000
      - http.cors.allow-credentials=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - 9200:9200
    networks:
      - vera_network

  elastic-initializer:
    build:
      context: .
      dockerfile: packages/elastic-initializer/Dockerfile
      target: dev
    depends_on:
      - elastic-search
    environment:
      - ELASTIC_NODE=${ELASTIC_NODE:-http://elastic-search:9200}
      - ELASTIC_USERNAME=${ELASTIC_USERNAME:-elastic}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-pass}
    volumes:
      - ./packages/elastic-initializer/src:/app/packages/elastic-initializer/src:z
    networks:
      - vera_network

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.5
    depends_on:
      - elastic-search
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTIC_NODE:-http://elastic-search:9200}
    ports:
      - 5601:5601
    networks:
      - vera_network

  postgres:
    image: postgres:18
    volumes:
      - postgresdata:/var/lib/postgresql/18/docker:z
    environment:
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-pass}'
      POSTGRES_PORT: '${POSTGRES_PORT:-5432}'
    ports:
      - 5432:5432
    networks:
      - vera_network

  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
    networks:
      - vera_network

networks:
  vera_network:

volumes:
  esdata:
  postgresdata:
