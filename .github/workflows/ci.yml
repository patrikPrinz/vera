name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['dev', 'master']

jobs:
  prevent_direct_push_to_protected:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Direct pushes to 'dev' and 'master' are not allowed. Please open a PR."
          exit 1

  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install
      - name: ESLint
        run: pnpm ci:lint
      - name: Prettier check
        run: pnpm ci:format
