name: build-and-push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: initializer
          - package: frontend
          - package: server

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: lowercase-repo-name
        uses: ASzc/change-string-case-action@v6
        with:
          string: ${{ github.repository }}

      - uses: docker/build-push-action@v5
        with:
          context: '.'
          file: ./packages/${{ matrix.package }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.lowercase-repo-name.outputs.lowercase }}-${{ matrix.package }}:${{ github.ref_name }}

      - if: ${{ !contains(github.ref_name, '-rc') }}
        uses: docker/build-push-action@v5
        with:
          context: '.'
          file: ./packages/${{ matrix.package }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.lowercase-repo-name.outputs.lowercase }}-${{ matrix.package }}:latest
